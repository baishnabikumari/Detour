<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detour</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1>Detour</h1>
        <p>The interesting shit between where you are and where you are going</p>
    </header>
    <section id="route-form">
        <input type="text" id="start" placeholder="Start" />
        <input type="text" id="end" placeholder="Destination" />
        <button id="find-btn">Find detours</button>
    </section>

    <main>
        <div id="map"></div>

        <aside id="results">
            <div id="filter">
                <select id="category-filter">
                    <option value="all">All Categories</option>
                    <option value="weird">Weird</option>
                    <option value="food">Food</option>
                    <option value="nature">Nature</option>
                    <option value="history">History</option>
                </select>
                <select id="sort-by">
                    <option value="score">Best detours</option>
                    <option value="time">Shortest detour</option>
                </select>
            </div>

            <div id="spot-list"></div>
        </aside>
    </main>
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="script.js"></script>
</body>
</html>
